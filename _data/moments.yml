# Stay a Moment — the approved feeling → (Scripture + song) map.
#
# Claude proposes; the songwriter approves (north-star: never auto-publish).
# Each of the 8 homepage chips defines a curated Scripture and song. The
# Tails of Grace PASSAGE is no longer pinned here: at build time it is drawn
# from the whole library — any kept excerpt themed to this feeling, across all
# nine books — and the site surfaces one at random, so a returning visitor is
# met by a different passage.
#
# Build step: `python scripts/build_moments.py` reads this + the library and
# writes assets/data/moments.json (curated scripture/song per feeling + a
# deduped pool of themed passages).
#
# Optional per-feeling overrides:
#   scripture_text       hand-trimmed snippet (for long or mis-extracted passages)
#   scripture_excerpted  true → the page shows a "Read all of <ref>" link

# Clean-text overrides for specific excerpts (excerpt id → shown snippet). Any
# excerpt in the pool with an entry here is displayed with this cleaned text.
excerpt_overrides:
  07-torn-but-still-loved-094: |
    Your broken heart is precious to Him. When you're tempted to hide your pain
    or tough it out alone, remember that those who are hurting get extra care,
    not less care. Your wounds don't make you less valuable. They make you the
    focus of the most tender love available.
  08-not-just-pedigree-part-2-146: |
    God sees you. He knows you. He loves you. He loves you in your questions and
    in your certainty. His love does not depend on what you preserve or what you
    become. You are already enough. You always have been.
  05-without-a-place-not-without-a-shepherd-049: |
    Every step you've taken — yes, even the wrong ones — have brought you here.
    And He's still walking with you. Every mile. Every moment. You are not lost.
    You are on your way.

feelings:
  anxious:
    scripture: "Psalm 46"
    scripture_excerpted: true
    scripture_text: |
      God is our refuge and strength, a very present help in trouble. Therefore
      will we not fear, though the earth do change, and though the mountains be
      shaken into the heart of the seas. ... Be still, and know that I am God.
      ... Jehovah of hosts is with us; the God of Jacob is our refuge.
    song: "be-still"

  weary:
    scripture: "Matthew 11:28-29"
    song: "come-and-rest"

  grieving:
    scripture: "Lamentations 3:22-23"
    song: "never-changes"

  lonely:
    scripture: "Psalm 139:1-4"
    song: "never-alone"

  ashamed:
    scripture: "Ephesians 2:4-5"
    song: "full-of-mercy"

  doubting:
    scripture: "2 Corinthians 5:7"
    song: "beyond"

  hopeful:
    scripture: "John 14:1-3"
    song: "a-place-for-me"

  grateful:
    scripture: "Psalm 100:4-5"
    scripture_text: |
      Enter into his gates with thanksgiving, and into his courts with praise;
      give thanks unto him, and bless his name. For Jehovah is good; his
      lovingkindness endureth for ever, and his faithfulness unto all generations.
    song: "go-to-him"
