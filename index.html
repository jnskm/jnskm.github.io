<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home | JNSKM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/stay-a-moment.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="{{ '/feed.xml' | relative_url }}">
</head>
<body class="site home">
  <header class="site-header">
    {% include header.html %}
  </header>

  <main class="site-main">
    <div class="content">
      <section class="stay-a-moment" id="sam-card">
        <div id="sam-prompt">
          <p class="sam-sub">How are you doing?</p>
          <div class="sam-chips" id="sam-chips">
            <button type="button" class="sam-chip" data-key="anxious">anxious</button>
            <button type="button" class="sam-chip" data-key="weary">weary</button>
            <button type="button" class="sam-chip" data-key="grieving">grieving</button>
            <button type="button" class="sam-chip" data-key="lonely">lonely</button>
            <button type="button" class="sam-chip" data-key="ashamed">ashamed</button>
            <button type="button" class="sam-chip" data-key="doubting">doubting</button>
            <button type="button" class="sam-chip" data-key="hopeful">hopeful</button>
            <button type="button" class="sam-chip" data-key="grateful">grateful</button>
          </div>
        </div>
        <div class="sam-loading" id="sam-loading" hidden>Listening</div>
        <div class="sam-result" id="sam-result" hidden></div>
      </section>
    </div>
  </main>
  <script src="{{ '/assets/js/stay-a-moment.js' | relative_url }}" defer></script>

  <footer class="site-footer">
    {% include footer.html %}
  </footer>
  <script>
    // Prevent browser from restoring scroll position
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }

    // Reset scroll position to top when page loads
    function resetScroll() {
      // Reset window scroll position
      window.scrollTo(0, 0);
      
      // Reset content wrapper scroll position
      const contentWrapper = document.querySelector('.site-main .content');
      if (contentWrapper) {
        contentWrapper.scrollTop = 0;
      }
    }

    // Reset on multiple events to ensure it works
    document.addEventListener('DOMContentLoaded', function() {
      // Use requestAnimationFrame to ensure it happens after rendering
      requestAnimationFrame(function() {
        resetScroll();
        // Double-check after a short delay
        setTimeout(resetScroll, 0);
      });
    });

    // Also reset on page load
    window.addEventListener('load', function() {
      requestAnimationFrame(function() {
        resetScroll();
      });
    });

    // Reset on pageshow (for back/forward navigation)
    window.addEventListener('pageshow', function(event) {
      if (event.persisted) {
        // Page was loaded from cache
        requestAnimationFrame(function() {
          resetScroll();
        });
      }
    });
  </script>
</body>
</html>
