# Manifest for the Tails of Grace book extraction.
#
# Each entry defines one finished book whose PDF will be extracted into
# paragraph-level JSON chunks for the jnskm.com encouragement library.
#
# To add a new book when finished:
#   1. Add an entry below with its slug, title, source_pdf, and cover_image.
#   2. Run: python3 scripts/extract_book.py <slug>
#
# Paths are relative:
#   - source_pdf is relative to books_root below
#   - cover_image is relative to the repo root (Jekyll path)

books_root: "/Users/jnskm/Documents/J&K/Tails_Of_Grace"

